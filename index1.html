var STORAGE_KEY = 'receipt-demo-v4';

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var saved = JSON.parse(raw);

    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      projects: state.projects,
      receipts: state.receipts

  } catch (e) {}

function fmt(n) {
  return '฿' + (n || 0).toLocaleString('th-TH', {
    minimumFractionDigits: 2, maximumFractionDigits: 2
  });
}

function getCatInfo(id) {
  for (var i = 0; i < CATEGORIES.length; i++) {
    if (CATEGORIES[i].id === id) return CATEGORIES[i];
  }
  return CATEGORIES[8];
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function findProject(id) {
  for (var i = 0; i < state.projects.length; i++) {
    if (state.projects[i].id === id) return state.projects[i];
  }
  return null;
}

function findReceipt(id) {
  for (var i = 0; i < state.receipts.length; i++) {
    if (state.receipts[i].id === id) return state.receipts[i];
  }
  return null;
}

function resizeAndToDataUrl(file, maxPx, quality) {
  maxPx = maxPx || 1600;
  quality = quality || 0.85;
  return new Promise(function(resolve, reject) {
    if (!file.type.startsWith('image/')) {
      reject(new Error('โปรดเลือกไฟล์รูปภาพ'));
      return;
    }
    var reader = new FileReader();
    reader.onerror = function() { reject(new Error('อ่านไฟล์ไม่ได้')); };
    reader.onload = function() {
      var img = new Image();
      img.onerror = function() { reject(new Error('รูปเสียหาย')); };
      img.onload = function() {
        var w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else       { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

      for (var i = 0; i < numItems; i++) {
        var itemAmt = Math.round((baseAmount / numItems) * (0.8 + Math.random() * 0.4) * 100) / 100;
        items.push({
          name: 'รายการที่ ' + (i + 1),
          amount_thb: itemAmt
        });
        itemsTotal += itemAmt;
      }
      
      var tax = Math.round(itemsTotal * 0.07 * 100) / 100;
      var total = itemsTotal + tax;

      resolve({
        vendor: vendor,
        date: today,
        total_thb: total,
        original_currency: 'THB',
        original_amount: total,
        exchange_rate: 1.0,
        category_id: cats[Math.floor(Math.random() * cats.length)],
        items: items,
        tax_thb: tax,
        note: '✅ ระบบ AI ประมวลผล'
      });
    }, 2000 + Math.random() * 2000);
  });
}

function renderToast() {
  if (!state.toast) return '';
  return '<div class="toast toast-' + state.toast.type + '">' + escapeHtml(state.toast.msg) + '</div>';
}

function renderHeader() {
  var proj = findProject(state.activeProject);
  var label = proj ? proj.name : 'ภาพรวมทั้งหมด';
  var visible = state.activeProject
    ? state.receipts.filter(function(r) { return r.projectId === state.activeProject; })
    : state.receipts;
  var total = visible.filter(function(r) { return r.data; })
    .reduce(function(s, r) { return s + r.data.total_thb; }, 0);
  return '<div class="header">' +
    '<div class="header-label">' + escapeHtml(label) + '</div>' +
    '<div class="header-row">' +
      '<div class="header-total">' + fmt(total) + '</div>' +
      '<div class="header-count">' + visible.length + ' ใบเสร็จ</div>' +
    '</div></div>';
}

function renderReceiptItem(receipt) {
  var d = receipt.data;
  var cat = d ? getCatInfo(d.category_id) : null;
  var dateObj = d ? new Date(d.date) : new Date(receipt.uploadedAt);
  var dateTH = dateObj.getDate() + ' ' + MONTHS_TH[dateObj.getMonth()];
  var proj = findProject(receipt.projectId);

  var titleHtml;
  if (receipt.status === 'processing') {
    titleHtml = '<span class="badge-processing"><span class="spinner"></span> วิเคราะห์อยู่…</span>';
  } else if (receipt.status === 'error') {
    titleHtml = '<span class="badge-error">❌ วิเคราะห์ไม่ได้</span>';
  } else {
    titleHtml = escapeHtml(d && d.vendor || 'ไม่ทราบร้าน');
  }

  var fileTypeIcon = receipt.fileType === 'image' ? '📷' : '📄';

  return '<button class="item" onclick="actions.selectReceipt(\'' + receipt.id + '\')">' +
    '<div class="thumb">' +
      (receipt.imageUrl
        ? '<img src="' + escapeHtml(receipt.imageUrl) + '" alt="">'
        : '<span>' + fileTypeIcon + '</span>') +
    '</div>' +
    '<div class="item-info">' +
      '<div class="item-title">' + titleHtml + '</div>' +
      '<div class="item-meta">' +
        (cat ? '<span class="badge badge-cat">' + cat.icon + ' ' + cat.label + '</span>' : '') +
        (proj ? '<span class="badge badge-proj">' + escapeHtml(proj.name) + '</span>' : '') +
        '<span class="badge-date">' + dateTH + '</span>' +
        '<span class="file-type-badge file-type-' + (receipt.fileType === 'image' ? 'image' : 'document') + '">' +
          (receipt.fileType === 'image' ? '📷 Image' : '📄 Document') +
        '</span>' +
      '</div>' +
    '</div>' +
    '<div class="item-amount">' +
      (d ? '<div class="item-amount-value">' + fmt(d.total_thb) + '</div>'
         : '<div style="width:24px;height:24px"></div>') +
      '<div class="item-arrow">›</div>' +
    '</div>' +
  '</button>';
}

function renderReceiptList() {
  var visible = state.activeProject
    ? state.receipts.filter(function(r) { return r.projectId === state.activeProject; })
    : state.receipts;
  if (visible.length === 0) {
    return '<div class="receipt-list">' +
      '<div class="empty">' +
        '<div class="empty-icon">🧾</div>' +
        '<div class="empty-title">ยังไม่มีใบเสร็จ</div>' +
        '<div class="empty-sub">กดปุ่ม ＋ เพื่อถ่ายหรืออัปโหลด</div>' +
      '</div></div>';
  }
  return '<div class="receipt-list">' +
    visible.map(renderReceiptItem).join('') +
  '</div>';
}

function renderSummary() {
  var src = (state.activeProject
    ? state.receipts.filter(function(r) { return r.projectId === state.activeProject; })
    : state.receipts
  ).filter(function(r) { return r.data; });

  var grand = src.reduce(function(s, r) { return s + r.data.total_thb; }, 0);
  var count = src.length;
  var proj = findProject(state.activeProject);
  var projName = proj ? proj.name : 'รวมทุกโปรเจค';
  var year = state.summaryYear;
  var inYear = src.filter(function(r) { return new Date(r.data.date).getFullYear() === year; });

  var bars;
  if (state.summaryMode === 'month') {
    bars = MONTHS_TH.map(function(name, i) {
      return {
        name: name,
        val: inYear.filter(function(r) { return new Date(r.data.date).getMonth() === i; })
                    .reduce(function(s, r) { return s + r.data.total_thb; }, 0)
      };
    });
  } else if (state.summaryMode === 'year') {
    var yearsSet = {};
    src.forEach(function(r) { yearsSet[new Date(r.data.date).getFullYear()] = true; });
    var years = Object.keys(yearsSet).map(Number).sort();
    bars = years.map(function(y) {
      return {
        name: (y + 543).toString(),
        val: src.filter(function(r) { return new Date(r.data.date).getFullYear() === y; })
                .reduce(function(s, r) { return s + r.data.total_thb; }, 0)
      };
    });
  } else {
    bars = CATEGORIES.map(function(c) {
      return {
        name: c.label, icon: c.icon,
        val: src.filter(function(r) { return r.data.category_id === c.id; })
                .reduce(function(s, r) { return s + r.data.total_thb; }, 0)
      };
    }).filter(function(c) { return c.val > 0; }).sort(function(a, b) { return b.val - a.val; });
  }

  var maxVal = Math.max.apply(null, bars.map(function(b) { return b.val; }).concat([1]));

  var barsHtml = bars.length === 0
    ? '<div style="text-align:center;color:#a0824d;padding:32px 0;font-size:14px">ยังไม่มีข้อมูล</div>'
    : bars.map(function(b) {
        return '<div class="bar-row">' +
          '<div class="bar-label">' +
            '<span>' + (b.icon ? b.icon + ' ' : '') + escapeHtml(b.name) + '</span>' +
            '<span class="bar-value ' + (b.val > 0 ? 'has' : 'none') + '">' +
              (b.val > 0 ? fmt(b.val) : '—') +
            '</span>' +
          '</div>' +
          '<div class="bar-track">' +
            '<div class="bar-fill" style="width:' + ((b.val / maxVal) * 100) + '%"></div>' +
          '</div>' +
        '</div>';
      }).join('');

  return '<div style="padding:16px 16px 100px">' +
    '<div class="summary-card">' +
      '<div class="label">' + escapeHtml(projName) + '</div>' +
      '<div class="total">' + fmt(grand) + '</div>' +
      '<div class="count">' + count + ' ใบเสร็จ</div>' +
    '</div>' +
    '<div class="tabs">' +
      '<button class="tab ' + (state.summaryMode === 'month' ? 'active' : '') + '" onclick="actions.setSummaryMode(\'month\')">รายเดือน</button>' +
      '<button class="tab ' + (state.summaryMode === 'year' ? 'active' : '') + '" onclick="actions.setSummaryMode(\'year\')">รายปี</button>' +
      '<button class="tab ' + (state.summaryMode === 'cat' ? 'active' : '') + '" onclick="actions.setSummaryMode(\'cat\')">หมวดหมู่</button>' +
    '</div>' +
    (state.summaryMode === 'month'
      ? '<div class="year-nav">' +
          '<button class="year-btn" onclick="actions.changeYear(-1)">‹</button>' +
          '<span class="year-label">ปี ' + (year + 543) + '</span>' +
          '<button class="year-btn" onclick="actions.changeYear(1)">›</button>' +
        '</div>'
      : '') +
    '<div class="bar-box">' + barsHtml + '</div>' +
  '</div>';
}

function renderNav() {
  var proj = findProject(state.activeProject);
  var projName = proj ? proj.name : 'โปรเจค';
  return '<nav class="nav">' +
    '<button class="nav-item ' + (state.tab === 'receipts' ? 'nav-active' : '') + '" onclick="actions.setTab(\'receipts\')">' +
      '<span class="icon">🧾</span><span>ใบเสร็จ</span>' +
    '</button>' +
    '<button class="nav-item ' + (state.tab === 'summary' ? 'nav-active' : '') + '" onclick="actions.setTab(\'summary\')">' +
      '<span class="icon">📊</span><span>สรุป</span>' +
    '</button>' +
    '<button class="nav-item" onclick="actions.openDrawer()">' +
      '<span class="icon">📁</span><span>' + escapeHtml(projName) + '</span>' +
    '</button>' +
  '</nav>';
}

function renderFab() {
  return '<button class="fab ' + (state.uploading ? 'loading' : '') + '" onclick="actions.openUploadModal()">' +
    (state.uploading ? '<span class="spinner"></span>' : '＋') +
  '</button>' +
  '<input type="file" id="fileInputCamera" accept="image/*" capture="environment">' +
  '<input type="file" id="fileInputGallery" accept="image/*">' +
  '<input type="file" id="fileInputDocument" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.jpg,.jpeg,.png">';
}

function renderUploadModal() {
  if (!state.uploadModalOpen) return '';
  return '<div class="upload-modal">' +
    '<div class="upload-content">' +
      '<div class="upload-icon">📸</div>' +
      '<div class="upload-title">อัพโหลดใบเสร็จ</div>' +
      '<div class="upload-section-title">📷 ถ่ายภาพ</div>' +
      '<div class="upload-options">' +
        '<button class="upload-btn upload-btn-camera" onclick="actions.triggerCamera()">' +
          '<span>📷</span> ถ่ายภาพจากกล้อง' +
        '</button>' +
      '</div>' +
      '<div class="upload-section-title">🖼️ ไฟล์ภาพ</div>' +
      '<div class="upload-options">' +
        '<button class="upload-btn upload-btn-gallery" onclick="actions.triggerGallery()">' +
          '<span>🖼️</span> เลือกจากโฟลเดอร์ (รูปภาพ)' +
        '</button>' +
      '</div>' +
      '<div class="upload-section-title">📄 ไฟล์ข้อมูล</div>' +
      '<div class="upload-options">' +
        '<button class="upload-btn upload-btn-document" onclick="actions.triggerDocument()">' +
          '<span>📄</span> PDF, Excel, Word' +
        '</button>' +
      '</div>' +
      '<div class="upload-options" style="margin-top: 16px;">' +
        '<button class="upload-btn upload-btn-cancel" onclick="actions.closeUploadModal()">' +
          'ยกเลิก' +
        '</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderDrawer() {
  if (!state.drawerOpen) return '';
  var projsHtml = state.projects.map(function(p) {
    return '<div class="proj-row">' +
      '<button class="proj-btn ' + (state.activeProject === p.id ? 'active' : '') + '" ' +
        'style="flex:1;margin:0" onclick="actions.selectProject(\'' + p.id + '\'); actions.closeDrawer()">' +
        '📁 ' + escapeHtml(p.name) +
      '</button>' +
      '<button class="proj-delete" onclick="actions.deleteProjectConfirm(\'' + p.id + '\', \'' + escapeHtml(p.name) + '\')">✕</button>' +
    '</div>';
  }).join('');

  return '<div class="backdrop" onclick="actions.closeDrawer()"></div>' +
    '<div class="sheet">' +
      '<div class="sheet-handle"></div>' +
      '<div class="sheet-title">โปรเจค</div>' +
      '<button class="proj-btn ' + (state.activeProject === null ? 'active' : '') + '" ' +
        'onclick="actions.selectProject(null); actions.closeDrawer()">📊 ภาพรวมทั้งหมด</button>' +
      projsHtml +
      '<div style="margin-top:16px;display:flex;gap:8px">' +
        '<input class="input" id="newProjName" placeholder="ชื่อโปรเจคใหม่…" ' +
          'onkeydown="if(event.key===\'Enter\') actions.addProjectFromInput()">' +
        '<button class="btn-primary" onclick="actions.addProjectFromInput()">+</button>' +
      '</div>' +
    '</div>';
}

function renderReceiptSheet() {
  if (!state.selectedReceiptId) return '';
  var receipt = findReceipt(state.selectedReceiptId);
  if (!receipt) return '';

  var d = receipt.data;
  var cat = d ? getCatInfo(d.category_id) : null;
  var dateObj = d ? new Date(d.date) : new Date(receipt.uploadedAt);
  var dateTH = dateObj.getDate() + ' ' + MONTHS_TH[dateObj.getMonth()] + ' ' + (dateObj.getFullYear() + 543);

  var detailHtml = '';
  if (receipt.status === 'processing') {
    detailHtml = '<div style="text-align:center;padding:32px 0;color:#a0824d">' +
      '<span class="spinner" style="width:28px;height:28px"></span>' +
      '<div style="font-weight:600;margin-top:12px">กำลังวิเคราะห์…</div>' +
    '</div>';
  } else if (receipt.status === 'error') {
    detailHtml = '<div style="background:#f5d9b5;border-radius:14px;padding:16px;margin-bottom:16px;color:#d67d5e;font-size:14px;border:2px solid #e8caa3">' +
      '<strong>วิเคราะห์ไม่สำเร็จ</strong><br>' +
      '<span style="opacity:.8">' + escapeHtml(receipt.errorMsg || '') + '</span>' +
    '</div>';
  } else if (d) {
    var itemsHtml = '';
    if (d.items && d.items.length > 0) {
      itemsHtml = '<div class="items-box">' +
        '<div class="items-label">รายการ</div>' +
        d.items.map(function(it) {
          return '<div class="items-row">' +
            '<span class="items-row-name">' + escapeHtml(it.name) + '</span>' +
            '<span class="items-row-amount">' + fmt(it.amount_thb) + '</span>' +
          '</div>';
        }).join('') +
        (d.tax_thb > 0
          ? '<div class="items-tax">' +
              '<span>VAT / ภาษี</span>' +
              '<span>' + fmt(d.tax_thb) + '</span>' +
            '</div>'
          : '') +
      '</div>';
    }

    var projOptionsHtml = '<option value="">— ไม่ระบุโปรเจค —</option>' +
      state.projects.map(function(p) {
        return '<option value="' + p.id + '" ' +
          (receipt.projectId === p.id ? 'selected' : '') + '>' +
          escapeHtml(p.name) +
        '</option>';
      }).join('');

    detailHtml = '<div class="detail-header">' +
      '<div>' +
        '<div class="detail-vendor">' + escapeHtml(d.vendor) + '</div>' +
        '<div class="detail-date">' + dateTH + '</div>' +
      '</div>' +
      '<div style="text-align:right">' +
        '<div class="detail-amount">' + fmt(d.total_thb) + '</div>' +
        (d.original_currency !== 'THB'
          ? '<div class="detail-curr">' +
              escapeHtml(d.original_currency) + ' ' + d.original_amount.toFixed(2) + ' × ' + d.exchange_rate +
            '</div>'
          : '') +
      '</div>' +
    '</div>' +
    '<div class="cat-pill">' + (cat ? cat.icon + ' ' + cat.label : '') + '</div>' +
    itemsHtml +
    (d.note ? '<div class="detail-note">' + escapeHtml(d.note) + '</div>' : '') +
    '<div class="form-group">' +
      '<div class="form-label">โปรเจค</div>' +
      '<select class="input" ' +
        'onchange="actions.updateReceiptProject(\'' + receipt.id + '\', this.value)">' +
        projOptionsHtml +
      '</select>' +
    '</div>';
  }

  return '<div class="backdrop" onclick="actions.closeReceiptSheet()" style="z-index:600"></div>' +
    '<div class="sheet" style="z-index:601">' +
      '<div class="sheet-handle"></div>' +
      (receipt.imageUrl ? '<img src="' + escapeHtml(receipt.imageUrl) + '" alt="receipt" class="receipt-img">' : '') +
      detailHtml +
      '<button class="btn-danger" onclick="actions.deleteReceiptConfirm(\'' + receipt.id + '\')">' +
        'ลบใบเสร็จนี้' +
      '</button>' +
    '</div>';
}

function render() {
  var app = document.getElementById('app');
  app.innerHTML =
    renderToast() +
    renderUploadModal() +
    renderHeader() +
    (state.tab === 'receipts' ? renderReceiptList() : '') +
    (state.tab === 'summary' ? renderSummary() : '') +
    renderFab() +
    renderNav() +
    renderDrawer() +
    renderReceiptSheet();
}

window.actions = {
  setTab: function(tab) { state.tab = tab; render(); },
  selectProject: function(id) { state.activeProject = id; render(); },
  openDrawer: function() { state.drawerOpen = true; render(); },
  closeDrawer: function() { state.drawerOpen = false; render(); },
  selectReceipt: function(id) { state.selectedReceiptId = id; render(); },
  closeReceiptSheet: function() { state.selectedReceiptId = null; render(); },
  setSummaryMode: function(mode) { state.summaryMode = mode; render(); },
  changeYear: function(delta) { state.summaryYear += delta; render(); },
  openUploadModal: function() { state.uploadModalOpen = true; render(); },
  closeUploadModal: function() { state.uploadModalOpen = false; render(); },

  triggerCamera: function() {
    var input = document.getElementById('fileInputCamera');
    if (input) input.click();
  },

  triggerGallery: function() {
    var input = document.getElementById('fileInputGallery');
    if (input) input.click();
  },

  triggerDocument: function() {
    var input = document.getElementById('fileInputDocument');
    if (input) input.click();
  },

  addProjectFromInput: function() {
    var input = document.getElementById('newProjName');
    if (!input) return;
    var name = input.value.trim();
    if (!name) return;
    var p = { id: 'p' + Date.now(), name: name };
    state.projects.push(p);
    state.activeProject = p.id;
    saveState();
    render();
    showToast('✅ สร้างโปรเจค "' + name + '" แล้ว');
  },

  deleteProjectConfirm: function(id, name) {
    if (!confirm('ลบโปรเจค "' + name + '"?')) return;
    state.projects = state.projects.filter(function(p) { return p.id !== id; });
    state.receipts = state.receipts.map(function(r) {
      return r.projectId === id ? Object.assign({}, r, { projectId: null }) : r;
    });
    if (state.activeProject === id) state.activeProject = null;
    saveState();
    showToast('🗑️ ลบโปรเจคแล้ว');
  },

  updateReceiptProject: function(id, projectId) {
    state.receipts = state.receipts.map(function(r) {
      return r.id === id ? Object.assign({}, r, { projectId: projectId || null }) : r;
    });
    saveState();
    render();
  },

  deleteReceiptConfirm: function(id) {
    if (!confirm('ลบใบเสร็จนี้?')) return;
    state.receipts = state.receipts.filter(function(r) { return r.id !== id; });
    state.selectedReceiptId = null;
    saveState();
    showToast('🗑️ ลบใบเสร็จแล้ว');
  },

  handleFiles: function(fileList) {
    var files = [];
    for (var i = 0; i < fileList.length; i++) {
      files.push(fileList[i]);
    }
    if (!files.length) {
      showToast('❌ โปรดเลือกไฟล์', 'error');
      return;
    }
    state.uploadModalOpen = false;
    state.uploading = true;
    render();

    var queue = files.slice();
    function processNext() {
      if (queue.length === 0) {
        state.uploading = false;
        render();
        return;
      }
      var file = queue.shift();
      var isImage = file.type.startsWith('image/');
      var tempId = 'temp_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      
      state.receipts.unshift({
        id: tempId, projectId: state.activeProject,
        status: 'processing',
        uploadedAt: new Date().toISOString(),
        fileType: isImage ? 'image' : 'document',
        data: null, imageUrl: null
      });
      render();

      var processChain = isImage
        ? resizeAndToDataUrl(file).then(function(dataUrl) {
            state.receipts = state.receipts.map(function(r) {
              return r.id === tempId ? Object.assign({}, r, { imageUrl: dataUrl }) : r;
            });
            render();
            return extractFromImage();
          })
        : new Promise(function(resolve) {
            setTimeout(function() {
              showToast('📄 ไฟล์ ' + file.name + ' อัปโหลดเรียบร้อย (ต้องกรอกข้อมูลเพิ่มเติม)', 'success');
              resolve({
                vendor: 'ไฟล์: ' + file.name.split('.')[0],
                date: new Date().toISOString().slice(0, 10),
                total_thb: 0,
                original_currency: 'THB',
                original_amount: 0,
                exchange_rate: 1.0,
                category_id: 'other',
                items: [{ name: 'กรุณากรอกข้อมูลจากไฟล์', amount_thb: 0 }],
                tax_thb: 0,
                note: '📄 ' + file.name + ' - กรุณาแก้ไขข้อมูล'
              });
            }, 1500);
          });

      processChain.then(function(data) {
        state.receipts = state.receipts.map(function(r) {
          return r.id === tempId ? Object.assign({}, r, { status: 'done', data: data }) : r;
        });
        saveState();
        render();
        showToast('✅ ' + data.vendor + ' — ' + fmt(data.total_thb));
        processNext();
      }).catch(function(err) {
        state.receipts = state.receipts.map(function(r) {
          return r.id === tempId ? Object.assign({}, r, { status: 'error', errorMsg: err.message }) : r;
        });
        saveState();
        render();
        showToast('❌ ' + (err.message || 'error'), 'error');
        processNext();
      });
    }
    processNext();
  }
};

document.addEventListener('DOMContentLoaded', function() {
  var cameraInput = document.getElementById('fileInputCamera');
  var galleryInput = document.getElementById('fileInputGallery');
  var documentInput = document.getElementById('fileInputDocument');
  
  if (cameraInput) {
    cameraInput.addEventListener('change', function(e) {
      actions.handleFiles(e.target.files);
      this.value = '';
    });
  }
  
  if (galleryInput) {
    galleryInput.addEventListener('change', function(e) {
      actions.handleFiles(e.target.files);
      this.value = '';
    });
  }

  if (documentInput) {
    documentInput.addEventListener('change', function(e) {
      actions.handleFiles(e.target.files);
      this.value = '';
    });
  }
});

loadState();
render();
</script>

</body>
