<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Gentle Journey — บัญชีใบเสร็จ</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, "Sarabun", "Noto Sans Thai", "Segoe UI", system-ui, sans-serif;
  min-height: 100vh; overscroll-behavior-y: none; background: #FDF8F0; color: #4D3420;
}

/* ===== ANIMATIONS ===== */
@keyframes float { 0%,100%{transform:translateY(0) scale(1);} 40%{transform:translateY(-14px) scale(1.03);} 70%{transform:translateY(-6px) scale(0.99);} }
@keyframes glow { 0%,100%{box-shadow:0 20px 60px rgba(107,76,42,.25),0 8px 25px rgba(107,76,42,.15);} 50%{box-shadow:0 30px 80px rgba(107,76,42,.4),0 12px 40px rgba(107,76,42,.25);} }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.55;} }
@keyframes spin { to{transform:rotate(360deg);} }
@keyframes slideUp { from{transform:translateY(100%);opacity:0;} to{transform:translateY(0);opacity:1;} }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
@keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
@keyframes landingOut { to{opacity:0;transform:scale(0.93);} }

/* ===== LANDING ===== */
#landing {
  position:fixed; inset:0; z-index:9999;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  background:radial-gradient(ellipse at 30% 20%,#FBF0DC 0%,#FDF8F0 40%,#EEF6EE 70%,#E5EEF8 100%);
  transition:opacity .5s ease, transform .5s ease;
}
#landing.hiding { opacity:0; transform:scale(0.94); pointer-events:none; }
.land-decor { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.land-decor span { position:absolute; opacity:.12; animation:float 3s ease-in-out infinite; font-size:26px; }
.land-decor span:nth-child(1){top:9%;left:7%;animation-delay:0s}
.land-decor span:nth-child(2){top:13%;right:9%;animation-delay:.6s;font-size:20px}
.land-decor span:nth-child(3){bottom:18%;left:5%;animation-delay:1.1s;font-size:22px}
.land-decor span:nth-child(4){bottom:14%;right:7%;animation-delay:1.5s;font-size:18px}
.land-decor span:nth-child(5){top:42%;left:2%;animation-delay:.9s;font-size:16px}
.land-decor span:nth-child(6){top:38%;right:2%;animation-delay:1.3s;font-size:18px}
.land-logo-btn {
  width:200px; height:200px; border-radius:50%; overflow:hidden;
  border:none; cursor:pointer; padding:0; outline:none;
  background:rgba(255,255,255,.92);
  animation:float 3.2s ease-in-out infinite, glow 2.2s ease-in-out infinite;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(10px);
  transition:transform .15s ease;
  margin-bottom:28px;
}
.land-logo-btn:active { transform:scale(0.9) !important; }
/* ทำให้โลโก้ถูกตัดเป็นวงกลมพอดี */
.land-logo-img { width:100%; height:100%; object-fit:cover; object-position:center; pointer-events:none; }
.land-title { font-size:28px; font-weight:800; color:#5C3E1E; letter-spacing:1px; margin-bottom:6px; }
.land-sub { font-size:15px; color:#9B7050; margin-bottom:24px; }
.land-hint { font-size:14px; color:#B09070; animation:pulse 2s ease-in-out infinite; }

/* ===== APP ===== */
#app-screen { max-width:480px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:80px; }

/* ===== HEADER ===== */
.header {
  position:sticky; top:0; z-index:100;
  background:rgba(253,248,240,.96); backdrop-filter:blur(14px);
  border-bottom:2px solid #E8D4B8; padding:14px 16px 12px;
  box-shadow:0 2px 14px rgba(107,76,42,.08);
}
.header-label { font-size:12px; color:#9B7050; font-weight:700; margin-bottom:2px; letter-spacing:.5px; }
.header-row { display:flex; justify-content:space-between; align-items:baseline; }
.header-total { font-size:28px; font-weight:800; color:#5C3E1E; }
.header-count { font-size:12px; color:#9B7050; background:#F0D9BB; padding:3px 10px; border-radius:99px; font-weight:600; }

/* ===== RECEIPT LIST ===== */
.receipt-list { padding:12px 16px; }
.empty { text-align:center; padding:80px 16px 0; }
.empty-icon { font-size:72px; margin-bottom:16px; animation:bounce 2s infinite; display:block; }
.empty-title { font-weight:700; font-size:18px; margin-bottom:8px; color:#5C3E1E; }
.empty-sub { color:#9B7050; font-size:14px; line-height:1.7; }

.item {
  width:100%; text-align:left; background:#FFFDF8;
  border-radius:20px; padding:14px 16px;
  display:flex; align-items:center; gap:14px; margin-bottom:10px;
  box-shadow:0 4px 16px rgba(107,76,42,.10), 0 1px 4px rgba(107,76,42,.06);
  transition:all .2s; border:1.5px solid #EEE0CC;
}
.item:active { transform:scale(0.97); box-shadow:0 2px 8px rgba(107,76,42,.08); }
.thumb {
  width:54px; height:54px; border-radius:16px; overflow:hidden; flex-shrink:0;
  background:linear-gradient(135deg,#F0D9BB,#E8CCA0);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(107,76,42,.12);
}
.thumb img { width:100%; height:100%; object-fit:cover; }
.thumb span { font-size:26px; }
.item-info { flex:1; min-width:0; }
.item-title { font-weight:700; font-size:15px; margin-bottom:5px; color:#3D2810; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-meta { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.item-amount { flex-shrink:0; text-align:right; }
.item-amount-value { font-weight:800; font-size:16px; color:#5C3E1E; }
.item-arrow { color:#D4A574; font-size:18px; margin-top:2px; }

/* ===== BADGES ===== */
.badge { font-size:11px; border-radius:99px; padding:3px 9px; font-weight:600; }
.badge-date { font-size:11px; color:#9B7050; }
.badge-error { color:#C44020; }
.badge-processing { color:#9B7050; display:inline-flex; align-items:center; gap:6px; }
.badge-proj { color:#3D6040; background:#E0F0E0; border:1px solid #B0D0B0; }
.cat-food     { background:#E8F5E8; color:#2D6030; border:1px solid #A8D4A8; }
.cat-travel   { background:#E5EEF8; color:#1E4E7A; border:1px solid #A0BEDD; }
.cat-hotel    { background:#F0EAF8; color:#5A2A8A; border:1px solid #C4A0DE; }
.cat-office   { background:#F3EDEA; color:#5A3A2A; border:1px solid #D8C0B8; }
.cat-software { background:#E5F5F2; color:#1A6A5A; border:1px solid #A0CEC8; }
.cat-marketing{ background:#FFF0E8; color:#8A3010; border:1px solid #E0B090; }
.cat-salary   { background:#E8EEF8; color:#1A3A6A; border:1px solid #A0B0D8; }
.cat-utility  { background:#FFF8E0; color:#6A5A00; border:1px solid #E0CC60; }
.cat-other    { background:#F0EDE8; color:#5A4A3A; border:1px solid #D0C4BC; }

/* ===== FAB ===== */
.fab {
  position:fixed; bottom:84px; right:20px; z-index:200;
  width:60px; height:60px; border-radius:30px;
  background:linear-gradient(135deg,#3A7FA5,#2A6F95); color:#fff; font-size:28px;
  box-shadow:0 8px 24px rgba(42,111,149,.45);
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.fab:active { transform:scale(0.9); }
.fab.loading { background:linear-gradient(135deg,#5A9A7A,#3A7A5A); }

/* ===== NAV ===== */
.nav {
  position:fixed; bottom:0; left:0; right:0; z-index:300;
  background:rgba(253,248,240,.97); backdrop-filter:blur(14px);
  border-top:2px solid #E8D4B8;
  display:flex; height:68px;
  padding-bottom:env(safe-area-inset-bottom,0);
  max-width:480px; margin:0 auto;
  box-shadow:0 -4px 16px rgba(107,76,42,.08);
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; padding-bottom:4px; color:#B09070; font-size:10px; font-weight:600;
  transition:color .2s;
}
.nav-item .icon { font-size:22px; transition:transform .2s; }
.nav-active { color:#3A7FA5; }
.nav-active .icon { transform:scale(1.12); }

/* ===== SHEETS ===== */
.backdrop { position:fixed; inset:0; background:rgba(40,25,10,.45); z-index:500; animation:fadeIn .2s ease; }
.sheet {
  position:fixed; bottom:0; left:0; right:0; z-index:501;
  background:#FFFDF8; border-radius:28px 28px 0 0;
  padding:20px 20px 40px; max-height:88vh; overflow-y:auto;
  animation:slideUp .25s ease; max-width:480px; margin:0 auto;
  box-shadow:0 -8px 32px rgba(107,76,42,.15);
}
.sheet-handle { width:40px; height:4px; background:#D4B898; border-radius:99px; margin:0 auto 20px; }
.sheet-title { font-weight:700; font-size:18px; margin-bottom:16px; color:#3D2810; }

/* ===== PROJECTS ===== */
.proj-btn {
  width:100%; text-align:left; padding:13px 16px; border-radius:14px; margin-bottom:6px;
  background:#F5EDE0; color:#5C3E1E; font-weight:500; font-size:15px;
  border:2px solid transparent; transition:all .2s;
}
.proj-btn.active { background:linear-gradient(135deg,#3A7FA5,#2A6F95); color:#fff; font-weight:700; box-shadow:0 4px 14px rgba(42,111,149,.35); }
.proj-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.proj-row .proj-btn { margin-bottom:0; }
.proj-delete { padding:12px 14px; border-radius:12px; background:#FFE8E0; color:#C44020; font-size:16px; font-weight:600; }

/* ===== INPUTS / BUTTONS ===== */
.input {
  border:2px solid #DDD0C0; border-radius:14px; padding:12px 14px; outline:none;
  width:100%; background:#FFFDF8; color:#3D2810; font-size:15px; transition:border-color .2s; font-family:inherit;
}
.input:focus { border-color:#3A7FA5; background:#fff; }
.btn-primary { background:linear-gradient(135deg,#3A7FA5,#2A6F95); color:#fff; border-radius:14px; padding:12px 18px; font-weight:700; font-size:15px; box-shadow:0 4px 14px rgba(42,111,149,.3); font-family:inherit; cursor:pointer; border:none; }
.btn-danger { background:#FFE8E0; color:#C44020; border-radius:14px; padding:14px; font-weight:700; font-size:15px; width:100%; border:2px solid #FFCABB; font-family:inherit; cursor:pointer; }

/* ===== RECEIPT DETAIL ===== */
.receipt-img { width:100%; max-height:280px; object-fit:contain; border-radius:20px; background:#F5EDE0; margin-bottom:16px; border:2px solid #E8D4B8; }
.detail-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.detail-vendor { font-size:20px; font-weight:700; color:#3D2810; }
.detail-date { color:#9B7050; font-size:13px; margin-top:2px; }
.detail-amount { font-size:24px; font-weight:800; color:#5C3E1E; }
.detail-curr { color:#9B7050; font-size:12px; }
.cat-pill { display:inline-flex; align-items:center; gap:6px; border-radius:99px; padding:8px 16px; font-size:13px; font-weight:700; margin-bottom:16px; }
.items-box { background:linear-gradient(135deg,#F5EDE0,#F0E4CC); border-radius:18px; padding:16px; margin-bottom:12px; border:1.5px solid #E8D4B8; }
.items-label { font-size:12px; font-weight:700; color:#5C3E1E; margin-bottom:8px; text-transform:uppercase; letter-spacing:.5px; }
.items-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid rgba(212,165,116,.3); }
.items-row:last-child { border-bottom:none; }
.items-row-name { color:#5C3E1E; font-size:14px; }
.items-row-amount { font-weight:700; font-size:14px; color:#3D2810; }
.items-tax { display:flex; justify-content:space-between; padding-top:10px; margin-top:4px; border-top:1px dashed rgba(212,165,116,.5); color:#9B7050; font-size:13px; }
.detail-note { font-size:13px; color:#9B7050; font-style:italic; margin-bottom:12px; line-height:1.5; }
.form-group { margin-bottom:16px; }
.form-label { font-size:12px; color:#5C3E1E; margin-bottom:6px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; display:block; }

/* ===== TOAST ===== */
.toast { position:fixed; top:56px; left:50%; transform:translateX(-50%); z-index:9999; max-width:90vw; color:#fff; border-radius:14px; padding:12px 20px; font-size:14px; font-weight:600; box-shadow:0 6px 24px rgba(40,25,10,.25); animation:slideUp .25s ease; }
.toast-success { background:linear-gradient(135deg,#3A8A5A,#2A7A4A); }
.toast-error { background:linear-gradient(135deg,#C44020,#A42800); }
.toast-info { background:linear-gradient(135deg,#3A7FA5,#2A6F95); }

/* ===== SUMMARY ===== */
.summary-card { background:linear-gradient(135deg,#3A7FA5 0%,#2A6F95 50%,#3A7050 100%); border-radius:24px; padding:28px 20px; color:#fff; margin-bottom:16px; text-align:center; box-shadow:0 8px 28px rgba(42,111,149,.35); }
.summary-card .label { font-size:13px; opacity:.85; margin-bottom:4px; letter-spacing:.5px; }
.summary-card .total { font-size:40px; font-weight:800; letter-spacing:-1.5px; }
.summary-card .count { font-size:13px; opacity:.75; margin-top:6px; }
.tabs { display:flex; gap:8px; margin-bottom:16px; padding:4px; background:#EDE0CC; border-radius:16px; }
.tab { flex:1; padding:9px 0; border-radius:12px; background:transparent; color:#9B7050; font-weight:600; font-size:13px; transition:all .2s; font-family:inherit; cursor:pointer; border:none; }
.tab.active { background:#fff; color:#3A7FA5; box-shadow:0 2px 8px rgba(107,76,42,.15); }
.year-nav { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:12px; }
.year-btn { background:#EDE0CC; border-radius:10px; padding:8px 16px; font-size:18px; color:#5C3E1E; transition:background .2s; font-family:inherit; cursor:pointer; border:none; }
.year-btn:active { background:#DDD0B8; }
.year-label { font-weight:700; font-size:15px; color:#3D2810; }
.bar-box { background:#FFFDF8; border-radius:20px; padding:16px; box-shadow:0 4px 16px rgba(107,76,42,.1); border:1.5px solid #EEE0CC; }
.bar-row { margin-bottom:14px; }
.bar-row:last-child { margin-bottom:0; }
.bar-label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; color:#3D2810; }
.bar-value { font-weight:700; }
.bar-value.has { color:#3D2810; }
.bar-value.none { color:#C0A880; }
.bar-track { background:#EDE0CC; border-radius:99px; height:10px; overflow:hidden; }
.bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#3A7FA5,#3A8A6A); transition:width .5s ease; }

/* ===== SETTINGS ===== */
.settings-section { background:#FFFDF8; border-radius:20px; padding:18px; box-shadow:0 4px 16px rgba(107,76,42,.1); border:1.5px solid #EEE0CC; margin-bottom:12px; }
.settings-title { font-size:12px; font-weight:700; color:#3A7FA5; text-transform:uppercase; letter-spacing:.8px; margin-bottom:14px; }
.key-status { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:99px; font-size:12px; font-weight:600; margin-bottom:12px; }
.key-status.ok { background:#E5F3E5; color:#2D6030; }
.key-status.missing { background:#FFE8E0; color:#C44020; }
.api-key-display { font-family:monospace; font-size:13px; color:#5C3E1E; background:#F5EDE0; padding:8px 12px; border-radius:10px; word-break:break-all; margin-bottom:10px; min-height:36px; }

/* ===== UPLOAD MODAL ===== */
.upload-modal { position:fixed; inset:0; z-index:999; display:flex; align-items:flex-end; justify-content:center; background:rgba(40,25,10,.45); animation:fadeIn .2s ease; }
.upload-content { background:#FFFDF8; border-radius:28px 28px 0 0; padding:24px 20px 40px; width:100%; max-width:480px; box-shadow:0 -8px 32px rgba(107,76,42,.2); animation:slideUp .25s ease; }
.upload-icon { font-size:44px; text-align:center; margin-bottom:12px; }
.upload-title { font-size:17px; font-weight:700; text-align:center; margin-bottom:20px; color:#3D2810; }
.upload-section-title { font-size:11px; font-weight:700; color:#3A7FA5; margin-top:14px; margin-bottom:8px; text-transform:uppercase; letter-spacing:.8px; }
.upload-options { display:flex; flex-direction:column; gap:8px; }
.upload-btn { padding:13px 16px; border-radius:14px; font-weight:600; font-size:14px; text-align:left; transition:all .2s; display:flex; align-items:center; gap:10px; font-family:inherit; cursor:pointer; border:none; }
.upload-btn-camera { background:linear-gradient(135deg,#3A7FA5,#2A6F95); color:#fff; }
.upload-btn-gallery { background:linear-gradient(135deg,#5A9A7A,#3A7A5A); color:#fff; }
.upload-btn-document { background:linear-gradient(135deg,#8A6040,#6A4020); color:#fff; }
.upload-btn-cancel { background:#EDE0CC; color:#5C3E1E; justify-content:center; }
.upload-btn:active { opacity:.85; transform:scale(0.98); }
#fileInputCamera,#fileInputGallery,#fileInputDocument { display:none; }

.spinner { display:inline-block; width:16px; height:16px; border:2.5px solid rgba(107,76,42,.2); border-top-color:#9B7050; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }

/* ===== NO-KEY WARNING ===== */
.no-key-warn { background:#FFE8E0; border-radius:14px; padding:12px 16px; margin-bottom:14px; font-size:13px; color:#C44020; border:1px solid #FFCABB; line-height:1.5; }
</style>
</head>

  <div id="app" style="max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:80px;"></div>
</div>

<script>
'use strict';

var CATEGORIES = [
  {id:'food',label:'อาหาร',icon:'🍜',cls:'cat-food'},

  {id:'utility',label:'สาธารณูปโภค',icon:'💡',cls:'cat-utility'},
  {id:'other',label:'อื่นๆ',icon:'📦',cls:'cat-other'}
];
var MONTHS_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

  data:{vendor:'เซเว่น อีเลฟเว่น',date:'2026-06-01',total_thb:187.20,original_currency:'THB',
    original_amount:187.20,exchange_rate:1.0,category_id:'food',
    items:[{name:'นมชาโอวิส',amount_thb:89.00},{name:'ข้าวกึ่งสำเร็จรูป',amount_thb:65.00},{name:'ขนมปัง',amount_thb:33.20}],

/* ===== GEMINI AI ANALYSIS ===== */
async function analyzeReceiptWithGemini(imageDataUrl) {
  var apiKey = localStorage.getItem('gj_gemini_key') || '';
  if (!apiKey) throw new Error('ยังไม่มี Gemini API Key — ไปที่ ⚙️ ตั้งค่า แล้วกรอก API Key ก่อนนะ');
  var base64Data = imageDataUrl.replace(/^data:[^;]+;base64,/,'');
  var mimeMatch = imageDataUrl.match(/^data:([^;]+);base64,/);
  var mimeType = mimeMatch ? mimeMatch[1] : 'image/jpeg';

  var prompt = `You are a precise receipt OCR and data extraction system. Analyze this receipt image with 100% accuracy.

CRITICAL RULES:
1. Read EVERY number and text carefully - do not guess
2. Thai Buddhist Era dates: subtract 543 from year to get AD. Example: 2568 BE → 2025 AD
3. Extract ALL line items with their EXACT prices
4. total_thb = the final GRAND TOTAL on the receipt (ยอดรวม / รวมทั้งหมด / Grand Total / Total)
5. tax_thb = VAT amount if shown separately (not included in total)
6. If total includes VAT, set tax_thb = 0
7. category_id MUST be exactly one of: food, travel, hotel, office, software, marketing, salary, utility, other
8. vendor = exact shop/restaurant name from receipt header
9. If image is blurry, do your absolute best to read it accurately

Respond with ONLY valid JSON (no markdown, no backticks, no explanation):
{"vendor":"store name","date":"YYYY-MM-DD","total_thb":0.00,"original_currency":"THB","original_amount":0.00,"exchange_rate":1.0,"category_id":"food","items":[{"name":"item","amount_thb":0.00}],"tax_thb":0.00,"note":"brief note"}`;

  var response = await fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + encodeURIComponent(apiKey),
    {method:'POST', headers:{'Content-Type':'application/json'},
     body:JSON.stringify({
       contents:[{parts:[{text:prompt},{inline_data:{mime_type:mimeType,data:base64Data}}]}],
       generationConfig:{temperature:0.0, maxOutputTokens:2048}
     })
    }
  );

  if (!response.ok) {
    var errData = await response.json().catch(function(){return{};});
    var msg = (errData.error && errData.error.message) || ('HTTP '+response.status);
    if (response.status===400) msg = 'API Key ไม่ถูกต้อง — กรุณาตรวจสอบใน ⚙️ ตั้งค่า';
    if (response.status===429) msg = 'เกิน quota ของ API — รอสักครู่แล้วลองใหม่';
    if (response.status===403) msg = 'API Key ไม่มีสิทธิ์ — ตรวจสอบการเปิดใช้ Gemini API';
    throw new Error('Gemini: ' + msg);
  }

  var data = await response.json();
  var candidates = data.candidates || [];
  if (!candidates.length) throw new Error('Gemini ไม่ส่งผลลัพธ์กลับมา — ลองอีกครั้ง');
  var text = '';
  var parts = (candidates[0].content && candidates[0].content.parts) || [];
  for (var i=0;i<parts.length;i++) { if (parts[i].text) text += parts[i].text; }
  text = text.trim().replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/\s*```$/i,'').trim();

  var parsed;
  try { parsed = JSON.parse(text); }
  catch(e) {
    var m = text.match(/\{[\s\S]*\}/);
    if (m) { try{parsed=JSON.parse(m[0]);}catch(e2){throw new Error('AI ส่งข้อมูลกลับมาผิดรูปแบบ — ลองใหม่');} }
    else throw new Error('AI ไม่สามารถอ่านใบเสร็จนี้ได้ — ลองถ่ายรูปใหม่ให้ชัดขึ้น');
  }

  return {
    vendor:String(parsed.vendor||'ไม่ทราบร้าน').trim(),
    date:String(parsed.date||new Date().toISOString().slice(0,10)).trim(),
    total_thb:Number(parsed.total_thb)||0,
    original_currency:String(parsed.original_currency||'THB'),
    original_amount:Number(parsed.original_amount)||Number(parsed.total_thb)||0,
    exchange_rate:Number(parsed.exchange_rate)||1.0,
    category_id:CATEGORIES.find(function(c){return c.id===parsed.category_id;})?parsed.category_id:'other',
    items:Array.isArray(parsed.items)?parsed.items.map(function(it){return{name:String(it.name||'รายการ'),amount_thb:Number(it.amount_thb)||0};}): [],
    tax_thb:Number(parsed.tax_thb)||0,
    note:String(parsed.note||'✅ วิเคราะห์โดย Gemini 2.0 Flash')
  };
}

function resizeImg(file,maxPx,quality){
  maxPx=maxPx||1600;quality=quality||0.88;
  if(!file.type.startsWith('image/'))return Promise.reject(new Error('โปรดเลือกไฟล์รูปภาพ'));
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onerror=function(){reject(new Error('อ่านไฟล์ไม่ได้'));};
    reader.onload=function(){
      var img=new Image();
      img.onerror=function(){reject(new Error('รูปเสียหาย'));};
      img.onload=function(){
        var w=img.width,h=img.height;
        if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
        var c=document.createElement('canvas');c.width=w;c.height=h;
        var ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',quality));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

  var detail='';

    detail='<div style="text-align:center;padding:40px 0;color:#9B7050"><div style="font-size:44px;margin-bottom:12px">🔍</div><div style="font-weight:700;margin-bottom:8px">กำลังวิเคราะห์ใบเสร็จ…</div><div style="font-size:13px">AI กำลังอ่านข้อมูลจากรูปภาพ</div></div>';
  }else if(r.status==='error'){
    detail='<div style="background:#FFE8E0;border-radius:16px;padding:16px;margin-bottom:16px;border:1.5px solid #FFCABB">'+
      '<div style="color:#C44020;font-weight:700;margin-bottom:6px">❌ วิเคราะห์ไม่สำเร็จ</div>'+
      '<div style="color:#903010;font-size:13px;margin-bottom:8px">'+esc(r.errorMsg||'')+'</div>'+
      '<div style="color:#9B7050;font-size:12px">💡 ตรวจสอบ API Key ในหน้า ⚙️ ตั้งค่า หรือถ่ายรูปใหม่ให้ชัดขึ้น</div>'+
    '</div>';
  }else if(d){
    var itemsHtml='';
    if(d.items&&d.items.length){
      itemsHtml='<div class="items-box"><div class="items-label">📋 รายการ</div>'+
        d.items.map(function(it){return'<div class="items-row"><span class="items-row-name">'+esc(it.name)+'</span><span class="items-row-amount">'+fmt(it.amount_thb)+'</span></div>';}).join('')+
        (d.tax_thb>0?'<div class="items-tax"><span>🏷️ VAT / ภาษี</span><span>'+fmt(d.tax_thb)+'</span></div>':'')+
      '</div>';
    }
    var projOptions='<option value="">— ไม่ระบุโปรเจค —</option>'+
      state.projects.map(function(p){return'<option value="'+p.id+'" '+(r.projectId===p.id?'selected':'')+'>'+esc(p.name)+'</option>';}).join('');
    detail='<div class="detail-header">'+
      '<div><div class="detail-vendor">'+esc(d.vendor)+'</div><div class="detail-date">🗓 '+dateTH+'</div></div>'+
      '<div style="text-align:right"><div class="detail-amount">'+fmt(d.total_thb)+'</div>'+
        (d.original_currency!=='THB'?'<div class="detail-curr">'+esc(d.original_currency)+' '+d.original_amount.toFixed(2)+' × '+d.exchange_rate+'</div>':'')+
      '</div></div>'+
      (cat?'<div class="cat-pill '+cat.cls+'">'+cat.icon+' '+cat.label+'</div>':'')+
      itemsHtml+
      (d.note?'<div class="detail-note">💬 '+esc(d.note)+'</div>':'')+
      '<div class="form-group"><label class="form-label">📁 โปรเจค</label>'+
        '<select class="input" onchange="actions.updateReceiptProject(\''+r.id+'\',this.value)">'+projOptions+'</select></div>';
  }
  return'<div class="backdrop" onclick="actions.closeReceiptSheet()" style="z-index:600"></div>'+
    '<div class="sheet" style="z-index:601"><div class="sheet-handle"></div>'+
    (r.imageUrl?'<img src="'+esc(r.imageUrl)+'" alt="receipt" class="receipt-img">':'')+
    detail+
    '<button class="btn-danger" onclick="actions.deleteReceiptConfirm(\''+r.id+'\')">🗑️ ลบใบเสร็จนี้</button></div>';
}

function render(){
  var app=document.getElementById('app');if(!app)return;
  app.innerHTML=
    renderToast()+
    renderHeader()+
    (state.tab==='receipts'?renderReceiptList():'')+
    (state.tab==='summary'?renderSummary():'')+
    (state.tab==='settings'?renderSettings():'')+
    renderFab()+renderNav()+renderDrawer()+renderReceiptSheet()+renderUploadModal();
  attachInputs();
}

function attachInputs(){
  ['fileInputCamera','fileInputGallery','fileInputDocument'].forEach(function(id){
    var el=document.getElementById(id);
    if(el&&!el._bound){el._bound=true;el.addEventListener('change',function(e){actions.handleFiles(e.target.files);this.value='';});}
  });
}

/* ===== ACTIONS ===== */
window.actions = {
  setTab:function(t){state.tab=t;render();},
  selectProject:function(id){state.activeProject=id;render();},
  openDrawer:function(){state.drawerOpen=true;render();},
  closeDrawer:function(){state.drawerOpen=false;render();},
  selectReceipt:function(id){state.selectedReceiptId=id;render();},
  closeReceiptSheet:function(){state.selectedReceiptId=null;render();},
  setSummaryMode:function(m){state.summaryMode=m;render();},
  changeYear:function(d){state.summaryYear+=d;render();},
  openUploadModal:function(){state.uploadModalOpen=true;render();},
  closeUploadModal:function(){state.uploadModalOpen=false;render();},
  triggerCamera:function(){var e=document.getElementById('fileInputCamera');if(e)e.click();},
  triggerGallery:function(){var e=document.getElementById('fileInputGallery');if(e)e.click();},
  triggerDocument:function(){var e=document.getElementById('fileInputDocument');if(e)e.click();},

  saveApiKey:function(){
    var input=document.getElementById('geminiKeyInput');if(!input)return;
    var key=input.value.trim();
    if(!key){showToast('❌ กรุณากรอก API Key','error');return;}
    // ✅ อัปเดตการตรวจสอบ ให้รับทั้ง AIza และ AQ ได้
    if(!key.startsWith('AIza') && !key.startsWith('AQ')){showToast('⚠️ API Key ควรขึ้นต้นด้วย AIza หรือ AQ...','error');return;}
    localStorage.setItem('gj_gemini_key',key);render();
    showToast('✅ บันทึก API Key เรียบร้อย — พร้อมวิเคราะห์ใบเสร็จ!');
  },

  clearAllData:function(){
    if(!confirm('ลบข้อมูลทั้งหมด? ใบเสร็จและโปรเจคทั้งหมดจะหาย'))return;
    state.receipts=[];state.projects=initialProjects.slice();state.activeProject=null;
    saveState();render();showToast('🗑️ ล้างข้อมูลทั้งหมดแล้ว');
  },

  addProjectFromInput:function(){
    var input=document.getElementById('newProjName');if(!input)return;
    var name=input.value.trim();if(!name)return;
    var p={id:'p'+Date.now(),name:name};
    state.projects.push(p);state.activeProject=p.id;
    saveState();render();showToast('✅ สร้างโปรเจค "'+name+'" แล้ว');
  },

  deleteProjectConfirm:function(id,name){
    if(!confirm('ลบโปรเจค "'+name+'"?'))return;
    state.projects=state.projects.filter(function(p){return p.id!==id;});
    state.receipts=state.receipts.map(function(r){return r.projectId===id?Object.assign({},r,{projectId:null}):r;});
    if(state.activeProject===id)state.activeProject=null;
    saveState();showToast('🗑️ ลบโปรเจคแล้ว');
  },

  updateReceiptProject:function(id,projectId){
    state.receipts=state.receipts.map(function(r){return r.id===id?Object.assign({},r,{projectId:projectId||null}):r;});
    saveState();render();
  },

  deleteReceiptConfirm:function(id){
    if(!confirm('ลบใบเสร็จนี้?'))return;
    state.receipts=state.receipts.filter(function(r){return r.id!==id;});
    state.selectedReceiptId=null;saveState();showToast('🗑️ ลบใบเสร็จแล้ว');
  },

  handleFiles:function(fileList){
    var files=[];for(var i=0;i<fileList.length;i++)files.push(fileList[i]);
    if(!files.length){showToast('❌ โปรดเลือกไฟล์','error');return;}
    state.uploadModalOpen=false;state.uploading=true;render();
    var queue=files.slice();
    function processNext(){
      if(!queue.length){state.uploading=false;render();return;}
      var file=queue.shift();
      var isImg=file.type.startsWith('image/');
      var tempId='r'+Date.now()+'_'+Math.random().toString(36).slice(2);
      state.receipts.unshift({id:tempId,projectId:state.activeProject,status:'processing',
        uploadedAt:new Date().toISOString(),fileType:isImg?'image':'document',data:null,imageUrl:null});
      render();
      var chain;
      if(isImg){
        chain=resizeImg(file).then(function(dataUrl){
          state.receipts=state.receipts.map(function(r){return r.id===tempId?Object.assign({},r,{imageUrl:dataUrl}):r;});
          render();return analyzeReceiptWithGemini(dataUrl);
        });
      }else{
        chain=new Promise(function(res,rej){
          if(file.type==='application/pdf'){rej(new Error('PDF ยังไม่รองรับ — กรุณาถ่ายรูปหรือส่งเป็น JPG/PNG'));}
          else{res({vendor:file.name.replace(/\.[^.]+$/,''),date:new Date().toISOString().slice(0,10),total_thb:0,original_currency:'THB',original_amount:0,exchange_rate:1.0,category_id:'other',items:[],tax_thb:0,note:'📄 กรุณากรอกข้อมูลเพิ่มเติม'});}
        });
      }
      chain.then(function(data){
        state.receipts=state.receipts.map(function(r){return r.id===tempId?Object.assign({},r,{status:'done',data:data}):r;});
        saveState();render();showToast('✅ '+data.vendor+' — '+fmt(data.total_thb));processNext();
      }).catch(function(err){
        state.receipts=state.receipts.map(function(r){return r.id===tempId?Object.assign({},r,{status:'error',errorMsg:err.message}):r;});
        saveState();render();showToast('❌ '+(err.message||'เกิดข้อผิดพลาด'),'error');processNext();
      });
    }
    processNext();
  }
};
</script>
</body>
</html>
