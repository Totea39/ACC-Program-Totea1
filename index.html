<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>บัญชีใบเสร็จ — Intelligent Receipt Manager</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body {
    background: #f8fafc;
    font-family: -apple-system, BlinkMacSystemFont, "Sarabun", "Noto Sans Thai", "Segoe UI", system-ui, sans-serif;
    color: #1e293b;
    min-height: 100vh;
    overscroll-behavior-y: none;
  }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 80px; }
  button { font-family: inherit; cursor: pointer; border: none; background: transparent; color: inherit; }
  input, select { font-family: inherit; font-size: 15px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2.5px solid #cbd5e1; border-top-color: #3b82f6;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }
  .demo-banner {
    background: linear-gradient(90deg, #10b981, #14b8a6);
    color: #fff; padding: 8px 16px; text-align: center;
    font-size: 12px; font-weight: 600;
  }
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(248,250,252,.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid #f1f5f9; padding: 14px 16px 12px;
  }
  .header-label { font-size: 13px; color: #94a3b8; font-weight: 600; margin-bottom: 2px; }
  .header-row { display: flex; justify-content: space-between; align-items: baseline; }
  .header-total { font-size: 26px; font-weight: 800; }
  .header-count { font-size: 13px; color: #94a3b8; }
  .receipt-list { padding: 12px 16px; }
  .empty { text-align: center; padding-top: 80px; }
  .empty-icon { font-size: 64px; margin-bottom: 16px; }
  .empty-title { font-weight: 700; font-size: 18px; margin-bottom: 8px; }
  .empty-sub { color: #94a3b8; font-size: 14px; }
  .item {
    width: 100%; text-align: left; background: #fff;
    border-radius: 16px; padding: 14px 16px; display: flex; align-items: center;
    gap: 14px; margin-bottom: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,.06);
    transition: transform 0.1s;
  }
  .item:active { transform: scale(0.98); }
  .thumb {
    width: 52px; height: 52px; border-radius: 12px; overflow: hidden; flex-shrink: 0;
    background: #f1f5f9; display: flex; align-items: center; justify-content: center;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .item-info { flex: 1; min-width: 0; }
  .item-title {
    font-weight: 600; font-size: 15px; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .item-amount { flex-shrink: 0; text-align: right; }
  .item-amount-value { font-weight: 700; font-size: 16px; }
  .item-arrow { color: #cbd5e1; font-size: 18px; margin-top: 2px; }
  .badge { font-size: 11px; border-radius: 99px; padding: 2px 8px; font-weight: 600; }
  .badge-cat { color: #3b82f6; background: #eff6ff; }
  .badge-proj { color: #7c3aed; background: #f5f3ff; }
  .badge-date { font-size: 11px; color: #94a3b8; }
  .badge-error { color: #ef4444; }
  .badge-processing { color: #94a3b8; display: inline-flex; align-items: center; gap: 6px; }
  .badge-currency { font-size: 10px; color: #059669; background: #d1fae5; padding: 2px 6px; border-radius: 6px; }
  .fab {
    position: fixed; bottom: 80px; right: 20px; z-index: 200;
    width: 60px; height: 60px; border-radius: 30px;
    background: linear-gradient(135deg,#2563eb,#3b82f6);
    color: #fff; font-size: 26px;
    box-shadow: 0 4px 20px rgba(37,99,235,.4);
    display: flex; align-items: center; justify-content: center;
  }
  .fab:active { transform: scale(0.95); }
  .fab.loading { background: #94a3b8; }
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
    background: rgba(255,255,255,.96); backdrop-filter: blur(12px);
    border-top: 1px solid #f1f5f9;
    display: flex; height: 64px;
    padding-bottom: env(safe-area-inset-bottom, 0);
    max-width: 480px; margin: 0 auto;
  }
  .nav-item {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; padding-bottom: 4px;
    color: #94a3b8; font-size: 10px; font-weight: 600;
  }
  .nav-item .icon { font-size: 22px; }
  .nav-active { color: #2563eb; }
  .backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 500;
  }
  .sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 501;
    background: #fff; border-radius: 24px 24px 0 0;
    padding: 20px 20px 40px; max-height: 88vh; overflow-y: auto;
    animation: slideUp .25s ease;
    max-width: 480px; margin: 0 auto;
  }
  .sheet-handle {
    width: 40px; height: 4px; background: #e2e8f0; border-radius: 99px;
    margin: 0 auto 20px;
  }
  .sheet-title { font-weight: 700; font-size: 17px; margin-bottom: 16px; }
  .proj-btn {
    width: 100%; text-align: left; padding: 13px 16px;
    border-radius: 12px; margin-bottom: 6px;
    background: #f8fafc; color: #374151;
    font-weight: 400; font-size: 15px;
  }
  .proj-btn.active { background: #eff6ff; color: #2563eb; font-weight: 600; }
  .proj-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .proj-row .proj-btn { margin-bottom: 0; }
  .proj-delete {
    padding: 12px 14px; border-radius: 10px;
    background: #fff1f2; color: #ef4444; font-size: 16px;
  }
  .input {
    border: 1.5px solid #e2e8f0; border-radius: 12px;
    padding: 12px 14px; outline: none; width: 100%;
    background: #fff;
  }
  .input:focus { border-color: #2563eb; }
  .btn-primary {
    background: #2563eb; color: #fff; border-radius: 12px;
    padding: 12px 18px; font-weight: 600; font-size: 15px;
  }
  .btn-danger {
    background: #fff1f2; color: #ef4444; border-radius: 14px;
    padding: 14px; font-weight: 700; font-size: 15px; width: 100%;
  }
  .receipt-img {
    width: 100%; max-height: 280px; object-fit: contain; border-radius: 16px;
    background: #f8fafc; margin-bottom: 16px; border: 1px solid #f1f5f9;
  }
  .detail-header {
    display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;
  }
  .detail-vendor { font-size: 20px; font-weight: 700; }
  .detail-date { color: #94a3b8; font-size: 14px; margin-top: 2px; }
  .detail-amount { font-size: 22px; font-weight: 800; color: #2563eb; }
  .detail-curr { color: #94a3b8; font-size: 12px; }
  .cat-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: #eff6ff; border-radius: 99px;
    padding: 6px 14px; font-size: 13px; color: #2563eb;
    font-weight: 600; margin-bottom: 16px;
  }
  .items-box {
    background: #f8fafc; border-radius: 14px; padding: 14px; margin-bottom: 12px;
  }
  .items-label { font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 8px; }
  .items-row {
    display: flex; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px solid #e2e8f0;
    align-items: flex-start; gap: 8px;
  }
  .items-row:last-child { border-bottom: none; }
  .items-row-name { color: #374151; font-size: 14px; flex: 1; }
  .items-row-amount { font-weight: 600; font-size: 14px; flex-shrink: 0; }
  .items-tax {
    display: flex; justify-content: space-between;
    padding-top: 8px; margin-top: 4px; border-top: 1px solid #e2e8f0;
    color: #94a3b8; font-size: 13px;
  }
  .detail-note { font-size: 13px; color: #94a3b8; font-style: italic; margin-bottom: 12px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; color: #64748b; margin-bottom: 6px; font-weight: 600; }
  .toast {
    position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
    z-index: 9999; max-width: 90vw;
    color: #fff; border-radius: 14px; padding: 12px 20px;
    font-size: 14px; font-weight: 600; box-shadow: 0 4px 24px rgba(0,0,0,.18);
    animation: slideUp .25s ease;
  }
  .toast-success { background: #10b981; }
  .toast-error { background: #ef4444; }
  .summary-card {
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    border-radius: 20px; padding: 24px 20px; color: #fff;
    margin-bottom: 16px; text-align: center;
  }
  .summary-card .label { font-size: 13px; opacity: 0.8; margin-bottom: 4px; }
  .summary-card .total { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
  .summary-card .count { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab {
    flex: 1; padding: 10px 0; border-radius: 12px;
    background: #f1f5f9; color: #64748b;
    font-weight: 600; font-size: 13px;
  }
  .tab.active { background: #2563eb; color: #fff; }
  .year-nav {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 12px;
  }
  .year-btn {
    background: #f1f5f9; border-radius: 10px;
    padding: 8px 16px; font-size: 18px;
  }
  .year-label { font-weight: 700; font-size: 15px; }
  .bar-box {
    background: #fff; border-radius: 16px; padding: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,.06);
  }
  .bar-row { margin-bottom: 12px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-label {
    display: flex; justify-content: space-between;
    font-size: 13px; margin-bottom: 5px; color: #374151;
  }
  .bar-value { font-weight: 700; }
  .bar-value.has { color: #1e293b; }
  .bar-value.none { color: #cbd5e1; }
  .bar-track {
    background: #f1f5f9; border-radius: 99px;
    height: 8px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    transition: width 0.4s ease;
  }
  .currency-info {
    background: #d1fae5; border-radius: 12px; padding: 10px 12px;
    margin-bottom: 12px; font-size: 13px; color: #065f46;
  }
  .currency-row {
    display: flex; justify-content: space-between;
    padding: 4px 0;
  }
  .currency-label { font-weight: 600; }
  .currency-value { font-family: 'Courier New', monospace; }
</style>
</head>
<body>

<div class="demo-banner">✨ บัญชีใบเสร็จอัจฉริยะ — AI OCR + Currency Converter + Smart Category</div>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
'use strict';

var CATEGORIES = [
  { id: 'food',      label: 'อาหาร',       icon: '🍜' },
  { id: 'travel',    label: 'เดินทาง',     icon: '🚗' },
  { id: 'hotel',     label: 'ที่พัก',       icon: '🏨' },
  { id: 'office',    label: 'สำนักงาน',     icon: '🖨️' },
  { id: 'software',  label: 'ซอฟต์แวร์',   icon: '💻' },
  { id: 'marketing', label: 'การตลาด',     icon: '📣' },
  { id: 'salary',    label: 'บุคลากร',      icon: '👥' },
  { id: 'utility',   label: 'สาธารณูปโภค', icon: '💡' },
  { id: 'other',     label: 'อื่นๆ',        icon: '📦' }
];

var KEYWORDS_CATEGORY = {
  food: ['ร้านอาหาร', 'ร้านกาแฟ', 'cafe', 'restaurant', 'starbucks', 'mcdonald', 'pizza', 'khao', 'noodle', 'bakery', '7-eleven', 'lotus', 'tesco', 'carrefour', 'fruits', 'market'],
  travel: ['taxi', 'grab', 'bus', 'train', 'airline', 'petrol', 'gas station', 'parking', 'transport', 'uber', 'motor'],
  hotel: ['hotel', 'resort', 'hostel', 'inn', 'accommodation', 'booking', 'airbnb'],
  office: ['office', 'supply', 'stationery', 'printer', 'paper', 'pen', 'desk', 'computer', 'hardware'],
  software: ['software', 'app', 'subscription', 'adobe', 'microsoft', 'google', 'cloud', 'license', 'aws'],
  utility: ['water', 'electric', 'electricity', 'internet', 'phone', 'mobile', 'ais', 'true', 'dtac', 'utility'],
  other: []
};

var CURRENCY_API = 'https://open.er-api.com/v6/latest/';
var CACHE_CURRENCY = 'currency_cache_v1';

var MONTHS_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

var initialProjects = [
  { id: 'p1', name: 'ส่วนตัว' },
  { id: 'p2', name: 'งานบริษัท' },
  { id: 'p3', name: 'ทริปเที่ยวเกาหลี' }
];

var initialReceipts = [];

var STORAGE_KEY = 'receipt-v4-prod';

var state = {
  projects: [],
  receipts: [],
  activeProject: null,
  tab: 'receipts',
  drawerOpen: false,
  selectedReceiptId: null,
  uploading: false,
  toast: null,
  summaryMode: 'month',
  summaryYear: new Date().getFullYear()
};

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var saved = JSON.parse(raw);
      state.projects = saved.projects || initialProjects;
      state.receipts = saved.receipts || initialReceipts;
      return;
    }
  } catch (e) {}
  state.projects = initialProjects.slice();
  state.receipts = initialReceipts.slice();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      projects: state.projects,
      receipts: state.receipts
    }));
  } catch (e) {}
}

function showToast(msg, type) {
  state.toast = { msg: msg, type: type || 'success' };
  render();
  setTimeout(function() {
    state.toast = null;
    render();
  }, 3500);
}

function fmt(n) {
  return '฿' + (n || 0).toLocaleString('th-TH', {
    minimumFractionDigits: 2, maximumFractionDigits: 2
  });
}

function getCatInfo(id) {
  for (var i = 0; i < CATEGORIES.length; i++) {
    if (CATEGORIES[i].id === id) return CATEGORIES[i];
  }
  return CATEGORIES[8];
}

function detectCategory(text) {
  text = text.toLowerCase();
  for (var cat in KEYWORDS_CATEGORY) {
    var keywords = KEYWORDS_CATEGORY[cat];
    for (var i = 0; i < keywords.length; i++) {
      if (text.indexOf(keywords[i]) !== -1) return cat;
    }
  }
  return 'other';
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function findProject(id) {
  for (var i = 0; i < state.projects.length; i++) {
    if (state.projects[i].id === id) return state.projects[i];
  }
  return null;
}

function findReceipt(id) {
  for (var i = 0; i < state.receipts.length; i++) {
    if (state.receipts[i].id === id) return state.receipts[i];
  }
  return null;
}

function resizeAndToDataUrl(file, maxPx, quality) {
  maxPx = maxPx || 1600;
  quality = quality || 0.85;
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onerror = function() { reject(new Error('อ่านไฟล์ไม่ได้')); };
    reader.onload = function() {
      var img = new Image();
      img.onerror = function() { reject(new Error('รูปเสียหาย')); };
      img.onload = function() {
        var w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else       { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function extractNumbersFromText(text) {
  var numbers = text.match(/[\d,\.]+/g) || [];
  return numbers.map(function(n) {
    return parseFloat(n.replace(/,/g, ''));
  }).filter(function(n) { return n && n > 0; }).sort(function(a, b) { return b - a; });
}

function performOCR(imageDataUrl) {
  return Tesseract.recognize(imageDataUrl, 'tha+eng', {
    logger: function(m) { console.log('OCR:', m.status, m.progress); }
  }).then(function(result) {
    return result.data.text;
  });
}

function fetchExchangeRate(currencyCode, targetDate) {
  return new Promise(function(resolve) {
    try {
      var cache = JSON.parse(localStorage.getItem(CACHE_CURRENCY) || '{}');
      var cacheKey = currencyCode + '_' + targetDate;
      if (cache[cacheKey]) {
        resolve(cache[cacheKey]);
        return;
      }
      fetch(CURRENCY_API + currencyCode)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var rate = data.rates && data.rates.THB ? data.rates.THB : 1.0;
          cache[cacheKey] = rate;
          localStorage.setItem(CACHE_CURRENCY, JSON.stringify(cache));
          resolve(rate);
        })
        .catch(function() { resolve(1.0); });
    } catch (e) {
      resolve(1.0);
    }
  });
}

function analyzeReceipt(imageDataUrl, uploadDate) {
  return new Promise(function(resolve, reject) {
    performOCR(imageDataUrl)
      .then(function(text) {
        var lines = text.split('\n');
        var vendor = lines[0] || 'ร้านค้า';
        var numbers = extractNumbersFromText(text);
        var total_thb = numbers.length > 0 ? numbers[0] : 0;
        var category = detectCategory(text);
        
        var items = [];
        for (var i = 1; i < Math.min(lines.length, 5); i++) {
          if (lines[i].trim().length > 0) {
            var lineNum = extractNumbersFromText(lines[i]);
            items.push({
              name: lines[i].replace(/[\d,\.]+/g, '').trim(),
              amount_thb: lineNum.length > 0 ? lineNum[0] : 0
            });
          }
        }

        var isCurrency = text.match(/USD|EUR|JPY|KRW|CNY|SGD|MYR|HKD|AUD|GBP/i);
        var detectedCurrency = isCurrency ? isCurrency[0].toUpperCase() : 'THB';

        if (detectedCurrency !== 'THB') {
          fetchExchangeRate(detectedCurrency, uploadDate).then(function(rate) {
            var data = {
              vendor: vendor,
              date: uploadDate,
              total_thb: Math.round(total_thb * rate * 100) / 100,
              original_currency: detectedCurrency,
              original_amount: total_thb,
              exchange_rate: rate,
              category_id: category,
              items: items,
              tax_thb: Math.round(total_thb * 0.07 * 100) / 100,
              note: '🤖 AI จดจำจากรูป (Tesseract OCR)',
              ocr_text: text
            };
            resolve(data);
          });
        } else {
          resolve({
            vendor: vendor,
            date: uploadDate,
            total_thb: total_thb,
            original_currency: 'THB',
            original_amount: total_thb,
            exchange_rate: 1.0,
            category_id: category,
            items: items,
            tax_thb: Math.round(total_thb * 0.07 * 100) / 100,
            note: '🤖 AI จดจำจากรูป (Tesseract OCR)',
            ocr_text: text
          });
        }
      })
      .catch(function(err) {
        reject(new Error('OCR วิเคราะห์ไม่ได้: ' + err.message));
      });
  });
}

function renderToast() {
  if (!state.toast) return '';
  return '<div class="toast toast-' + state.toast.type + '">' + escapeHtml(state.toast.msg) + '</div>';
}

function renderHeader() {
  var proj = findProject(state.activeProject);
  var label = proj ? proj.name : 'ภาพรวมทั้งหมด';
  var visible = state.activeProject
    ? state.receipts.filter(function(r) { return r.projectId === state.activeProject; })
    : state.receipts;
  var total = visible.filter(function(r) { return r.data; })
    .reduce(function(s, r) { return s + r.data.total_thb; }, 0);
  return '<div class="header">' +
    '<div class="header-label">' + escapeHtml(label) + '</div>' +
    '<div class="header-row">' +
      '<div class="header-total">' + fmt(total) + '</div>' +
      '<div class="header-count">' + visible.length + ' ใบเสร็จ</div>' +
    '</div></div>';
}

function renderReceiptItem(receipt) {
  var d = receipt.data;
  var cat = d ? getCatInfo(d.category_id) : null;
  var dateObj = d ? new Date(d.date) : new Date(receipt.uploadedAt);
  var dateTH = dateObj.getDate() + ' ' + MONTHS_TH[dateObj.getMonth()];
  var proj = findProject(receipt.projectId);

  var titleHtml;
  if (receipt.status === 'processing') {
    titleHtml = '<span class="badge-processing"><span class="spinner"></span> วิเคราะห์อยู่…</span>';
  } else if (receipt.status === 'error') {
    titleHtml = '<span class="badge-error">❌ ' + escapeHtml(receipt.errorMsg || 'วิเคราะห์ไม่ได้') + '</span>';
  } else {
    titleHtml = escapeHtml(d && d.vendor || 'ไม่ทราบร้าน');
  }

  var currencyBadge = (d && d.original_currency && d.original_currency !== 'THB')
    ? '<span class="badge-currency">' + d.original_currency + '</span>'
    : '';

  return '<button class="item" onclick="actions.selectReceipt(\'' + receipt.id + '\')">' +
    '<div class="thumb">' +
      (receipt.imageUrl
        ? '<img src="' + escapeHtml(receipt.imageUrl) + '" alt="">'
        : '<span style="font-size:22px">🧾</span>') +
    '</div>' +
    '<div class="item-info">' +
      '<div class="item-title">' + titleHtml + '</div>' +
      '<div class="item-meta">' +
        (cat ? '<span class="badge badge-cat">' + cat.icon + ' ' + cat.label + '</span>' : '') +
        currencyBadge +
        (proj ? '<span class="badge badge-proj">' + escapeHtml(proj.name) + '</span>' : '') +
        '<span class="badge-date">' + dateTH + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="item-amount">' +
      (d ? '<div class="item-amount-value">' + fmt(d.total_thb) + '</div>'
         : '<div style="width:24px;height:24px"></div>') +
      '<div class="item-arrow">›</div>' +
    '</div>' +
  '</button>';
}

function renderReceiptList() {
  var visible = state.activeProject
    ? state.receipts.filter(function(r) { return r.projectId === state.activeProject; })
    : state.receipts;
  if (visible.length === 0) {
    return '<div class="receipt-list">' +
      '<div class="empty">' +
        '<div class="empty-icon">🧾</div>' +
        '<div class="empty-title">ยังไม่มีใบเสร็จ</div>' +
        '<div class="empty-sub">กดปุ่ม ＋ เพื่อถ่ายหรืออัปโหลด</div>' +
      '</div></div>';
  }
  return '<div class="receipt-list">' +
    visible.map(renderReceiptItem).join('') +
  '</div>';
}

function renderSummary() {
  var src = (state.activeProject
    ? state.receipts.filter(function(r) { return r.projectId === state.activeProject; })
    : state.receipts
  ).filter(function(r) { return r.data; });

  var grand = src.reduce(function(s, r) { return s + r.data.total_thb; }, 0);
  var count = src.length;
  var proj = findProject(state.activeProject);
  var projName = proj ? proj.name : 'รวมทุกโปรเจค';
  var year = state.summaryYear;
  var inYear = src.filter(function(r) { return new Date(r.data.date).getFullYear() === year; });

  var bars;
  if (state.summaryMode === 'month') {
    bars = MONTHS_TH.map(function(name, i) {
      return {
        name: name,
        val: inYear.filter(function(r) { return new Date(r.data.date).getMonth() === i; })
                    .reduce(function(s, r) { return s + r.data.total_thb; }, 0)
      };
    });
  } else if (state.summaryMode === 'year') {
    var yearsSet = {};
    src.forEach(function(r) { yearsSet[new Date(r.data.date).getFullYear()] = true; });
    var years = Object.keys(yearsSet).map(Number).sort();
    bars = years.map(function(y) {
      return {
        name: (y + 543).toString(),
        val: src.filter(function(r) { return new Date(r.data.date).getFullYear() === y; })
                .reduce(function(s, r) { return s + r.data.total_thb; }, 0)
      };
    });
  } else {
    bars = CATEGORIES.map(function(c) {
      return {
        name: c.label, icon: c.icon,
        val: src.filter(function(r) { return r.data.category_id === c.id; })
                .reduce(function(s, r) { return s + r.data.total_thb; }, 0)
      };
    }).filter(function(c) { return c.val > 0; }).sort(function(a, b) { return b.val - a.val; });
  }

  var maxVal = Math.max.apply(null, bars.map(function(b) { return b.val; }).concat([1]));

  var barsHtml = bars.length === 0
    ? '<div style="text-align:center;color:#94a3b8;padding:32px 0;font-size:14px">ยังไม่มีข้อมูล</div>'
    : bars.map(function(b) {
        return '<div class="bar-row">' +
          '<div class="bar-label">' +
            '<span>' + (b.icon ? b.icon + ' ' : '') + escapeHtml(b.name) + '</span>' +
            '<span class="bar-value ' + (b.val > 0 ? 'has' : 'none') + '">' +
              (b.val > 0 ? fmt(b.val) : '—') +
            '</span>' +
          '</div>' +
          '<div class="bar-track">' +
            '<div class="bar-fill" style="width:' + ((b.val / maxVal) * 100) + '%"></div>' +
          '</div>' +
        '</div>';
      }).join('');

  return '<div style="padding:16px 16px 100px">' +
    '<div class="summary-card">' +
      '<div class="label">' + escapeHtml(projName) + '</div>' +
      '<div class="total">' + fmt(grand) + '</div>' +
      '<div class="count">' + count + ' ใบเสร็จ</div>' +
    '</div>' +
    '<div class="tabs">' +
      '<button class="tab ' + (state.summaryMode === 'month' ? 'active' : '') + '" onclick="actions.setSummaryMode(\'month\')">รายเดือน</button>' +
      '<button class="tab ' + (state.summaryMode === 'year' ? 'active' : '') + '" onclick="actions.setSummaryMode(\'year\')">รายปี</button>' +
      '<button class="tab ' + (state.summaryMode === 'cat' ? 'active' : '') + '" onclick="actions.setSummaryMode(\'cat\')">หมวดหมู่</button>' +
    '</div>' +
    (state.summaryMode === 'month'
      ? '<div class="year-nav">' +
          '<button class="year-btn" onclick="actions.changeYear(-1)">‹</button>' +
          '<span class="year-label">ปี ' + (year + 543) + '</span>' +
          '<button class="year-btn" onclick="actions.changeYear(1)">›</button>' +
        '</div>'
      : '') +
    '<div class="bar-box">' + barsHtml + '</div>' +
  '</div>';
}

function renderNav() {
  var proj = findProject(state.activeProject);
  var projName = proj ? proj.name : 'โปรเจค';
  return '<nav class="nav">' +
    '<button class="nav-item ' + (state.tab === 'receipts' ? 'nav-active' : '') + '" onclick="actions.setTab(\'receipts\')">' +
      '<span class="icon">🧾</span><span>ใบเสร็จ</span>' +
    '</button>' +
    '<button class="nav-item ' + (state.tab === 'summary' ? 'nav-active' : '') + '" onclick="actions.setTab(\'summary\')">' +
      '<span class="icon">📊</span><span>สรุป</span>' +
    '</button>' +
    '<button class="nav-item" onclick="actions.openDrawer()">' +
      '<span class="icon">📁</span><span>' + escapeHtml(projName) + '</span>' +
    '</button>' +
  '</nav>';
}

function renderFab() {
  return '<button class="fab ' + (state.uploading ? 'loading' : '') + '" onclick="actions.triggerUpload()">' +
    (state.uploading ? '<span class="spinner"></span>' : '＋') +
  '</button>' +
  '<input type="file" id="fileInput" accept="image/*" capture="environment" multiple ' +
    'style="display:none" onchange="actions.handleFiles(this.files); this.value=\'\';">';
}

function renderDrawer() {
  if (!state.drawerOpen) return '';
  var projsHtml = state.projects.map(function(p) {
    return '<div class="proj-row">' +
      '<button class="proj-btn ' + (state.activeProject === p.id ? 'active' : '') + '" ' +
        'style="flex:1;margin:0" onclick="actions.selectProject(\'' + p.id + '\'); actions.closeDrawer()">' +
        '📁 ' + escapeHtml(p.name) +
      '</button>' +
      '<button class="proj-delete" onclick="actions.deleteProjectConfirm(\'' + p.id + '\', \'' + escapeHtml(p.name) + '\')">✕</button>' +
    '</div>';
  }).join('');

  return '<div class="backdrop" onclick="actions.closeDrawer()"></div>' +
    '<div class="sheet">' +
      '<div class="sheet-handle"></div>' +
      '<div class="sheet-title">โปรเจค</div>' +
      '<button class="proj-btn ' + (state.activeProject === null ? 'active' : '') + '" ' +
        'onclick="actions.selectProject(null); actions.closeDrawer()">📊 ภาพรวมทั้งหมด</button>' +
      projsHtml +
      '<div style="margin-top:16px;display:flex;gap:8px">' +
        '<input class="input" id="newProjName" placeholder="ชื่อโปรเจคใหม่…" ' +
          'onkeydown="if(event.key===\'Enter\') actions.addProjectFromInput()">' +
        '<button class="btn-primary" onclick="actions.addProjectFromInput()">+</button>' +
      '</div>' +
    '</div>';
}

function renderReceiptSheet() {
  if (!state.selectedReceiptId) return '';
  var receipt = findReceipt(state.selectedReceiptId);
  if (!receipt) return '';

  var d = receipt.data;
  var cat = d ? getCatInfo(d.category_id) : null;
  var dateObj = d ? new Date(d.date) : new Date(receipt.uploadedAt);
  var dateTH = dateObj.getDate() + ' ' + MONTHS_TH[dateObj.getMonth()] + ' ' + (dateObj.getFullYear() + 543);

  var detailHtml = '';
  if (receipt.status === 'processing') {
    detailHtml = '<div style="text-align:center;padding:32px 0;color:#94a3b8">' +
      '<span class="spinner" style="width:28px;height:28px"></span>' +
      '<div style="font-weight:600;margin-top:12px">🤖 กำลังวิเคราะห์ OCR…</div>' +
      '<div style="font-size:12px;margin-top:6px">อาจใช้เวลา 30-60 วินาที</div>' +
    '</div>';
  } else if (receipt.status === 'error') {
    detailHtml = '<div style="background:#fff1f2;border-radius:14px;padding:16px;margin-bottom:16px;color:#dc2626;font-size:14px">' +
      '<strong>❌ วิเคราะห์ไม่สำเร็จ</strong><br>' +
      '<span style="opacity:.8">' + escapeHtml(receipt.errorMsg || '') + '</span>' +
    '</div>';
  } else if (d) {
    var currencyHtml = '';
    if (d.original_currency !== 'THB') {
      currencyHtml = '<div class="currency-info">' +
        '<div class="currency-row">' +
          '<span class="currency-label">สกุลเงิน:</span>' +
          '<span class="currency-value">' + d.original_currency + ' ' + d.original_amount.toFixed(2) + '</span>' +
        '</div>' +
        '<div class="currency-row">' +
          '<span class="currency-label">อัตราแลกเปลี่ยน:</span>' +
          '<span class="currency-value">1 ' + d.original_currency + ' = ' + fmt(d.exchange_rate) + ' ฿</span>' +
        '</div>' +
        '<div class="currency-row">' +
          '<span class="currency-label">วันที่:</span>' +
          '<span class="currency-value">' + dateTH + '</span>' +
        '</div>' +
      '</div>';
    }

    var itemsHtml = '';
    if (d.items && d.items.length > 0) {
      itemsHtml = '<div class="items-box">' +
        '<div class="items-label">🛍️ รายการค่าใช้จ่าย</div>' +
        d.items.map(function(it) {
          return '<div class="items-row">' +
            '<span class="items-row-name">' + escapeHtml(it.name) + '</span>' +
            '<span class="items-row-amount">' + fmt(it.amount_thb) + '</span>' +
          '</div>';
        }).join('') +
        (d.tax_thb > 0
          ? '<div class="items-tax">' +
              '<span>💰 VAT / ภาษี</span>' +
              '<span>' + fmt(d.tax_thb) + '</span>' +
            '</div>'
          : '') +
      '</div>';
    }

    var projOptionsHtml = '<option value="">— ไม่ระบุโปรเจค —</option>' +
      state.projects.map(function(p) {
        return '<option value="' + p.id + '" ' +
          (receipt.projectId === p.id ? 'selected' : '') + '>' +
          escapeHtml(p.name) +
        '</option>';
      }).join('');

    detailHtml = '<div class="detail-header">' +
      '<div>' +
        '<div class="detail-vendor">🏪 ' + escapeHtml(d.vendor) + '</div>' +
        '<div class="detail-date">' + dateTH + '</div>' +
      '</div>' +
      '<div style="text-align:right">' +
        '<div class="detail-amount">' + fmt(d.total_thb) + '</div>' +
      '</div>' +
    '</div>' +
    currencyHtml +
    '<div class="cat-pill">' + (cat ? cat.icon + ' ' + cat.label : '') + '</div>' +
    itemsHtml +
    (d.note ? '<div class="detail-note">' + escapeHtml(d.note) + '</div>' : '') +
    '<div class="form-group">' +
      '<div class="form-label">📂 โปรเจค</div>' +
      '<select class="input" style="background:#f8fafc" ' +
        'onchange="actions.updateReceiptProject(\'' + receipt.id + '\', this.value)">' +
        projOptionsHtml +
      '</select>' +
    '</div>';
  }

  return '<div class="backdrop" onclick="actions.closeReceiptSheet()" style="z-index:600"></div>' +
    '<div class="sheet" style="z-index:601">' +
      '<div class="sheet-handle"></div>' +
      (receipt.imageUrl ? '<img src="' + escapeHtml(receipt.imageUrl) + '" alt="receipt" class="receipt-img">' : '') +
      detailHtml +
      '<button class="btn-danger" onclick="actions.deleteReceiptConfirm(\'' + receipt.id + '\')">' +
        '🗑️ ลบใบเสร็จนี้' +
      '</button>' +
    '</div>';
}

function render() {
  var app = document.getElementById('app');
  app.innerHTML =
    renderToast() +
    renderHeader() +
    (state.tab === 'receipts' ? renderReceiptList() : '') +
    (state.tab === 'summary' ? renderSummary() : '') +
    renderFab() +
    renderNav() +
    renderDrawer() +
    renderReceiptSheet();
}

window.actions = {
  setTab: function(tab) { state.tab = tab; render(); },
  selectProject: function(id) { state.activeProject = id; render(); },
  openDrawer: function() { state.drawerOpen = true; render(); },
  closeDrawer: function() { state.drawerOpen = false; render(); },
  selectReceipt: function(id) { state.selectedReceiptId = id; render(); },
  closeReceiptSheet: function() { state.selectedReceiptId = null; render(); },
  setSummaryMode: function(mode) { state.summaryMode = mode; render(); },
  changeYear: function(delta) { state.summaryYear += delta; render(); },

  addProjectFromInput: function() {
    var input = document.getElementById('newProjName');
    if (!input) return;
    var name = input.value.trim();
    if (!name) return;
    var p = { id: 'p' + Date.now(), name: name };
    state.projects.push(p);
    state.activeProject = p.id;
    saveState();
    render();
    showToast('✅ สร้างโปรเจค "' + name + '" แล้ว');
  },

  deleteProjectConfirm: function(id, name) {
    if (!confirm('ลบโปรเจค "' + name + '"?')) return;
    state.projects = state.projects.filter(function(p) { return p.id !== id; });
    state.receipts = state.receipts.map(function(r) {
      return r.projectId === id ? Object.assign({}, r, { projectId: null }) : r;
    });
    if (state.activeProject === id) state.activeProject = null;
    saveState();
    showToast('🗑️ ลบโปรเจคแล้ว');
  },

  updateReceiptProject: function(id, projectId) {
    state.receipts = state.receipts.map(function(r) {
      return r.id === id ? Object.assign({}, r, { projectId: projectId || null }) : r;
    });
    saveState();
    render();
  },

  deleteReceiptConfirm: function(id) {
    if (!confirm('ลบใบเสร็จนี้?')) return;
    state.receipts = state.receipts.filter(function(r) { return r.id !== id; });
    state.selectedReceiptId = null;
    saveState();
    showToast('🗑️ ลบใบเสร็จแล้ว');
  },

  triggerUpload: function() {
    if (state.uploading) return;
    var input = document.getElementById('fileInput');
    if (input) input.click();
  },

  handleFiles: function(fileList) {
    var files = [];
    for (var i = 0; i < fileList.length; i++) {
      if (fileList[i].type.indexOf('image/') === 0) files.push(fileList[i]);
    }
    if (!files.length) {
      showToast('❌ โปรดเลือกรูปภาพ', 'error');
      return;
    }
    state.uploading = true;
    render();

    var queue = files.slice();
    function processNext() {
      if (queue.length === 0) {
        state.uploading = false;
        render();
        return;
      }
      var file = queue.shift();
      var tempId = 'temp_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      var uploadDate = new Date().toISOString().slice(0, 10);
      
      state.receipts.unshift({
        id: tempId, projectId: state.activeProject,
        status: 'processing',
        uploadedAt: new Date().toISOString(),
        data: null, imageUrl: null
      });
      render();

      resizeAndToDataUrl(file).then(function(dataUrl) {
        state.receipts = state.receipts.map(function(r) {
          return r.id === tempId ? Object.assign({}, r, { imageUrl: dataUrl }) : r;
        });
        render();
        return analyzeReceipt(dataUrl, uploadDate);
      }).then(function(data) {
        state.receipts = state.receipts.map(function(r) {
          return r.id === tempId ? Object.assign({}, r, { status: 'done', data: data }) : r;
        });
        saveState();
        render();
        showToast('✅ ' + data.vendor + ' — ' + fmt(data.total_thb));
        processNext();
      }).catch(function(err) {
        state.receipts = state.receipts.map(function(r) {
          return r.id === tempId ? Object.assign({}, r, { status: 'error', errorMsg: err.message }) : r;
        });
        saveState();
        render();
        showToast('❌ ' + (err.message || 'เกิดข้อผิดพลาด'), 'error');
        processNext();
      });
    }
    processNext();
  }
};

loadState();
render();
</script>

</body>
</html>
